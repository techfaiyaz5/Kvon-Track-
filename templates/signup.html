<!DOCTYPE html>
<html>
<head>
    <title>KVON TECH | Secure Signup</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --kvon-orange: #f47920; --kvon-blue: #1d426e; }
        body { background: #eef2f7; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .signup-card { border: none; border-radius: 25px; box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 100%; max-width: 500px; background: white; padding: 2.5rem; border-top: 8px solid var(--kvon-orange); }
        .btn-kvon { background: var(--kvon-blue); color: white; border-radius: 12px; font-weight: bold; border: none; padding: 12px; transition: 0.3s; }
        .btn-kvon:hover { background: var(--kvon-orange); }
    </style>
</head>
<body>
    <div class="signup-card">
        <div class="text-center mb-4">
            <img src="{{ url_for('static', filename='logo.png') }}" style="width: 100px;">
            <h4 class="mt-3 fw-bold" style="color: var(--kvon-blue);">Register Portal Account</h4>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}{% for category, message in messages %}
            <div class="alert alert-{{ category }} small">{{ message }}</div>
          {% endfor %}{% endif %}
        {% endwith %}

        <form method="POST">
            <div class="row g-2 mb-3">
                <div class="col-6"><input type="text" name="first_name" class="form-control" placeholder="First Name" required></div>
                <div class="col-6"><input type="text" name="last_name" class="form-control" placeholder="Last Name" required></div>
            </div>
            <input type="text" name="username" class="form-control mb-3" placeholder="Choose Username" required>
            <input type="email" name="email" class="form-control mb-3" placeholder="Work Email" required>
            
            <div class="mb-3">
                <label class="small fw-bold text-danger">Admin Secret Key (Only for Admins)</label>
                <input type="password" name="admin_key" class="form-control border-danger" placeholder="Leave blank if you are an Employee">
            </div>

            <input type="text" name="emp_id" class="form-control mb-3" placeholder="Employee ID (KV-101)" required>
            <div class="mb-3">
                <label class="small text-muted ps-1">Date of Birth</label>
                <input type="date" name="dob" class="form-control" required>
            </div>
            <input type="password" name="password" class="form-control mb-4" placeholder="Create Password" required>
            
            <button type="submit" class="btn btn-kvon w-100 shadow">CREATE ACCOUNT</button>
            <p class="text-center mt-3 small text-muted">Go back to <a href="/login" class="text-dark fw-bold">Login</a></p>
        </form>
    </div>
</body>
</html>
