<!DOCTYPE html>
<html>
<head>
    <title>KVON TECH | Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background: #f8f9fc; padding: 40px; font-family: 'Inter', sans-serif; }
        .card { border: none; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-export { border-radius: 12px; font-weight: bold; margin-left: 10px; padding: 10px 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <h3 class="fw-bold"><a href="/dashboard" class="text-dark text-decoration-none me-3"><i class="fa fa-arrow-left"></i></a> {{ title }}</h3>
            <div>
                <a href="/download/excel" class="btn btn-success btn-export shadow-sm"><i class="fa fa-file-excel me-2"></i>Excel</a>
                <a href="/download/pdf" class="btn btn-danger btn-export shadow-sm"><i class="fa fa-file-pdf me-2"></i>PDF</a>
            </div>
        </div>

        <div class="card p-4 overflow-hidden">
            <table class="table table-hover">
                <thead class="table-light">
                    <tr><th>Date</th><th>Check-In</th><th>Check-Out</th><th>Verification</th></tr>
                </thead>
                <tbody>
                    {% for log in logs %}
                    <tr>
                        <td>{{ log.check_in.strftime('%d %B, %Y') }}</td>
                        <td class="fw-bold text-primary">{{ log.check_in.strftime('%I:%M %p') }}</td>
                        <td>{{ log.check_out.strftime('%I:%M %p') if log.check_out else '--:--' }}</td>
                        <td><a href="/static/uploads/{{ log.selfie }}" target="_blank" class="btn btn-sm btn-outline-dark rounded-pill">View Selfie</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
