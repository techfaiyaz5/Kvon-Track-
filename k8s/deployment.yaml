# 1. Deployment File: Ye bataegi ki app kaise chalegi
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kvontrack-gemini
  labels:
    app: kvontrack-gemini
spec:
  replicas: 2 # Do pods chalenge, agar ek crash hua to dusra sambhal lega
  selector:
    matchLabels:
      app: kvontrack-gemini
  template:
    metadata:
      labels:
        app: kvontrack-gemini
    spec:
      containers:
      - name: kvontrack-gemini
        # Yahan Jenkins wala image name aayega (latest tag ke saath)
        image: your-dockerhub-username/kvontrack-gemini:latest 
        ports:
        - containerPort: 5000
        # Resources limit taaki server hang na ho
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"

---

# 2. Service File: Ab ye NodePort use karegi bina extra charge ke
apiVersion: v1
kind: Service
metadata:
  name: kvontrack-gemini-service
spec:
  selector:
    app: kvontrack-gemini
  ports:
    - protocol: TCP
      port: 80 # Service internal port
      targetPort: 5000 # Flask app port
      nodePort: 31000 # Ye wo port hai jo tum browser mein use karoge
  type: NodePort # LoadBalancer ki jagah NodePort kar diya hai