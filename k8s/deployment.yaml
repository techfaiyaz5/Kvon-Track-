# 1. Deployment File
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kvontrack-gemini
  labels:
    app: kvontrack-gemini
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: kvontrack-gemini
  template:
    metadata:
      labels:
        app: kvontrack-gemini
    spec:
      containers:
      - name: kvontrack-gemini
        image: your-dockerhub-username/kvontrack-gemini:latest 
        ports:
        - containerPort: 5000
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"

---

# 2. Service File: NodePort Configuration
apiVersion: v1
kind: Service
metadata:
  name: kvontrack-gemini-service
spec:
  type: NodePort # Ye pehle aana chahiye taaki clear rahe
  selector:
    app: kvontrack-gemini
  ports:
    - protocol: TCP
      port: 80 
      targetPort: 5000 
      nodePort: 31000 # Isi port par app fix hogi