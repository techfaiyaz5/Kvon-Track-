# 1. Deployment (Resource limits zaroori hain HPA ke liye)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kvontrack-gemini
spec:
  replicas: 2
  selector:
    matchLabels:
      app: kvontrack-gemini
  template:
    metadata:
      labels:
        app: kvontrack-gemini
    spec:
      containers:
      - name: kvontrack-gemini
        image: techfaiyaz5/kvontrack-gemini:${IMAGE_TAG}
        ports:
        - containerPort: 5000
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "100m"
            memory: "128Mi"
---
# 2. Service (NodePort taaki browser mein khul sake)
apiVersion: v1
kind: Service
metadata:
  name: kvontrack-gemini-service
spec:
  type: NodePort
  selector:
    app: kvontrack-gemini
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
      nodePort: 30007
---
# 3. HPA (Horizontal Pod Autoscaler)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: kvontrack-gemini-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: kvontrack-gemini
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 50